<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>装嵌生产管理平台</title>
  <link rel="icon" type="image/x-icon" href="/assets/logo.ico">
  <link rel="stylesheet" href="/assets/vendor/element-ui.css">
  <script src="/assets/vendor/vue.min.js"></script>
  <script src="/assets/vendor/vue-router.min.js"></script>
  <script src="/assets/vendor/axios.min.js"></script>
  <script src="/assets/vendor/element-ui.min.js"></script>
    <style>
    :root {
      --brand: #1890ff;
      --brand-dark: #096dd9;
      --accent: #36b37e;
      --danger: #f56c6c;
      --bg: #f0f2f5;
      --panel: #ffffff;
      --text-main: #303133;
      --text-sub: #606266;
      --border: #dcdfe6;
      --sidebar-grad: linear-gradient(180deg, #001528 0%, #001E38 50%, #002B4E 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      color: var(--text-main);
      background: var(--bg);
    }

    .app-login {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 15% 20%, #1890ff33 0%, transparent 30%),
                  radial-gradient(circle at 80% 70%, #096dd933 0%, transparent 35%),
                  linear-gradient(130deg, #001528 0%, #001E38 55%, #002B4E 100%);
      padding: 20px;
    }

    .login-card {
      width: 420px;
      max-width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 16px 40px rgba(8, 42, 80, 0.32);
      overflow: hidden;
    }

    .login-head {
      background: linear-gradient(90deg, #096dd9 0%, #1890ff 100%);
      color: #fff;
      padding: 22px 26px;
    }

    .login-head h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .login-head p {
      font-size: 13px;
      opacity: 0.9;
    }

    .login-body {
      background: #ffffff;
      padding: 24px;
    }

    .login-hint {
      margin-top: 10px;
      color: #8a9199;
      font-size: 12px;
      text-align: center;
    }

    .layout {
      min-height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 228px;
      background: var(--sidebar-grad);
      color: #fff;
      box-shadow: 3px 0 12px rgba(16, 43, 78, 0.2);
    }

    .logo {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.04);
    }

    .brand-logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.15);
      padding: 2px;
    }

    .brand-logo-lg {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.15);
      padding: 3px;
    }

    .sidebar .el-menu {
      border-right: none;
      background: transparent;
    }

    .sidebar .el-menu-item,
    .sidebar .el-submenu__title {
      color: rgba(255, 255, 255, 0.88);
      height: 50px;
      line-height: 50px;
    }

    .sidebar .el-menu-item:hover,
    .sidebar .el-submenu__title:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    /* Icon replacement - use checkbox symbol */
    .sidebar .el-menu-item i,
    .sidebar .el-submenu__title i {
      display: inline-block;
      width: 20px;
      text-align: center;
      margin-right: 8px;
      font-family: Arial, sans-serif;
      font-style: normal;
    }

    .sidebar .el-menu-item i::before,
    .sidebar .el-submenu__title i::before {
      content: "☑";
      font-size: 16px;
    }

    .sidebar .el-menu-item.is-active {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      height: 64px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
    }

    .topbar-title {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--brand-dark);
      font-weight: 600;
    }

    .topbar-title img {
      width: 24px;
      height: 24px;
      border-radius: 5px;
      object-fit: contain;
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .login-brand h1 {
      margin-bottom: 0;
    }

    .content {
      padding: 18px;
    }

    .breadcrumbs {
      margin-bottom: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
    }

    .card,
    .el-card {
      border-radius: 8px;
      border-color: var(--border);
      margin-bottom: 14px;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .stat-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .stat-box::after {
      content: "";
      position: absolute;
      right: -20px;
      top: -20px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(24, 144, 255, 0.16), rgba(24, 144, 255, 0));
    }

    .stat-label {
      color: var(--text-sub);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .stat-value {
      color: var(--brand-dark);
      font-size: 26px;
      font-weight: 700;
    }

    .table-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f5f7fa;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    .table-head .title { font-weight: 600; }

    .table-head .meta {
      color: var(--text-sub);
      font-size: 13px;
    }

    .table-head .meta strong { color: var(--brand); }

    .pagination-wrap {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .el-table th {
      background: var(--brand) !important;
      color: #fff !important;
      font-weight: 600;
    }

    .el-pagination.is-background .el-pager li:not(.disabled).active {
      background: var(--brand);
    }

    .sheet-title-block {
      text-align: center;
      padding: 8px 0 6px;
    }

    .sheet-company {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #1f1f1f;
    }

    .sheet-title {
      margin-top: 6px;
      font-size: 16px;
      letter-spacing: 4px;
      color: #333;
    }

    .sheet-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: center;
      padding: 8px 12px 14px;
      color: #606266;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }

    .sheet-doc-head {
      border: 1px solid #333;
      margin-top: 8px;
    }

    .sheet-doc-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      border-top: 1px solid #333;
      min-height: 38px;
      align-items: center;
      font-size: 14px;
      color: #222;
    }

    .sheet-doc-row:first-child {
      border-top: none;
    }

    .sheet-doc-cell {
      border-left: 1px solid #333;
      padding: 6px 10px;
      min-height: 38px;
      display: flex;
      align-items: center;
    }

    .sheet-doc-row .sheet-doc-cell:first-child {
      border-left: none;
    }

    .sheet-footer-note {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 0;
      margin-top: 14px;
      border: 1px solid #333;
      border-bottom: none;
      font-size: 14px;
      color: #222;
    }

    .sheet-footer-note div {
      min-height: 38px;
      padding: 8px 10px;
      border-right: 1px solid #333;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
    }

    .sheet-footer-note div:last-child {
      border-right: none;
    }

    .sheet-table-wrap {
      overflow: auto;
      padding-top: 12px;
    }

    .sheet-table-wrap .el-table th {
      background: #fff !important;
      color: #303133 !important;
    }

    .sheet-table-wrap .el-table td,
    .sheet-table-wrap .el-table th {
      border-color: #333 !important;
    }

    .sheet-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      color: #606266;
      font-size: 13px;
    }

    .sheet-summary strong {
      color: var(--brand-dark);
    }

    .sheet-signatures {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
      padding: 6px 2px 2px;
      color: #303133;
      font-size: 13px;
    }

    .numeric-cell {
      display: inline-block;
      width: 100%;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .global-loading-mask {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.45);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      color: #409eff;
      font-size: 14px;
      gap: 10px;
    }

    .global-loading-mask i {
      font-size: 34px;
    }

    @media (max-width: 1200px) {
      .dashboard-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 960px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; }
      .dashboard-grid { grid-template-columns: 1fr; }
      .topbar { padding: 0 12px; }
      .content { padding: 10px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <router-view></router-view>
  </div>

  <script>
    axios.defaults.baseURL = '/';
    axios.defaults.withCredentials = true;

    const authStore = {
      getUser() {
        return JSON.parse(localStorage.getItem('user') || '{}');
      },
      getPermissions() {
        return JSON.parse(localStorage.getItem('permissions') || '[]');
      },
      getMenus() {
        return JSON.parse(localStorage.getItem('menus') || '[]');
      },
      saveAuth(payload) {
        localStorage.setItem('user', JSON.stringify(payload.user || {}));
        localStorage.setItem('permissions', JSON.stringify(payload.permissions || []));
        localStorage.setItem('menus', JSON.stringify(payload.menus || []));
      },
      clear() {
        localStorage.removeItem('user');
        localStorage.removeItem('permissions');
        localStorage.removeItem('menus');
      }
    };

    axios.interceptors.response.use(
      response => response,
      error => {
        if (error.response && error.response.status === 401) {
          authStore.clear();
          if (router.currentRoute.path !== '/login') router.push('/login');
        }
        return Promise.reject(error);
      }
    );

    const AppLayout = {
      props: ['title', 'breadcrumb'],
      template: `
        <div class="layout">
          <aside class="sidebar">
            <div class="logo">
              <img class="brand-logo" src="/assets/logo.ico" alt="logo">
              <span>生产管理平台</span>
            </div>
            <el-menu :default-active="activeMenu" background-color="transparent" text-color="#fff" active-text-color="#fff" @select="handleSelect">
              <template v-for="menu in menus">
                <el-submenu v-if="menu.children && menu.children.length" :index="menu.path" :key="menu.id">
                  <template slot="title"><i :class="menu.icon"></i><span>{{ menu.name }}</span></template>
                  <el-menu-item v-for="child in menu.children" :key="child.id" :index="normalizePath(child.path)">{{ child.name }}</el-menu-item>
                </el-submenu>
                <el-menu-item v-else :index="normalizePath(menu.path)" :key="menu.id"><i :class="menu.icon"></i><span slot="title">{{ menu.name }}</span></el-menu-item>
              </template>
            </el-menu>
          </aside>
          <main class="main">
            <header class="topbar">
              <div class="topbar-title"><img src="/assets/logo.ico" alt="logo"><span>{{ title }}</span></div>
              <div>
                <span style="margin-right: 10px; color: #606266;">欢迎，{{ user.nickname || user.username }}</span>
                <el-button size="mini" @click="handleLogout">退出</el-button>
              </div>
            </header>
            <section class="content">
              <div class="breadcrumbs">
                <el-breadcrumb separator=">">
                  <el-breadcrumb-item v-for="item in breadcrumb" :key="item">{{ item }}</el-breadcrumb-item>
                </el-breadcrumb>
              </div>
              <slot></slot>
            </section>
          </main>
        </div>
      `,
      data() {
        return {
          user: authStore.getUser(),
          menus: authStore.getMenus(),
          activeMenu: this.$route.path
        };
      },
      mounted() {
        // Refresh current session info and menus from backend to ensure menus are up-to-date
        axios.get('/api/me').then(res => {
          if (res.data && res.data.status === 'success' && res.data.data) {
            // res.data.data contains user, permissions, menus
            const payload = {
              user: { id: res.data.data.id, username: res.data.data.username, nickname: res.data.data.nickname },
              permissions: res.data.data.permissions || [],
              menus: res.data.data.menus || []
            };
            authStore.saveAuth(payload);
            this.user = authStore.getUser();
            this.menus = authStore.getMenus();
          }
        }).catch(() => {});
      },
      watch: {
        '$route.path'(val) { this.activeMenu = val; }
      },
      methods: {
        normalizePath(path) {
          if (path === '/system/users') return '/users';
          if (path === '/system/roles') return '/roles';
          return path || '/dashboard';
        },
        handleSelect(path) {
          if (path !== this.$route.path) this.$router.push(path);
        },
        async handleLogout() {
          try { await axios.post('/api/logout'); } catch (e) {}
          authStore.clear();
          this.$router.push('/login');
        }
      }
    };

    const Login = {
      template: `
        <div class="app-login">
          <div class="login-card">
            <div class="login-head">
              <div class="login-brand">
                <img class="brand-logo-lg" src="/assets/logo.ico" alt="logo">
                <h1>ABUS嵌生产进度管理系统</h1>
              </div>
            </div>
            <div class="login-body">
              <el-form :model="loginForm" @submit.native.prevent>
                <el-form-item label="用户名">
                  <el-input v-model.trim="loginForm.username" placeholder="请输入用户名" />
                </el-form-item>
                <el-form-item label="密码">
                  <el-input v-model="loginForm.password" type="password" show-password placeholder="请输入密码" @keyup.enter.native="handleLogin" />
                </el-form-item>
                <el-form-item>
                  <el-button type="primary" style="width: 100%;" :loading="loading" @click="handleLogin">登录</el-button>
                </el-form-item>
              </el-form>
            </div>
          </div>
        </div>
      `,
      data() {
        return {
          loginForm: { username: '', password: '' },
          loading: false
        };
      },
      methods: {
        async handleLogin() {
          if (!this.loginForm.username || !this.loginForm.password) {
            this.$message.warning('请输入用户名和密码');
            return;
          }
          this.loading = true;
          try {
            const res = await axios.post('/api/login', this.loginForm);
            if (res.data.status !== 'success') {
              this.$message.error(res.data.message || '登录失败');
              return;
            }
            authStore.saveAuth(res.data);
            this.$message.success('登录成功');
            this.$router.push('/dashboard');
          } catch (error) {
            this.$message.error('登录失败，请检查网络');
          } finally {
            this.loading = false;
          }
        }
      }
    };

    const Dashboard = {
      components: { AppLayout },
      template: `
        <app-layout title="生产进度查询系统" :breadcrumb="['首页', '生产概览']">
          <div class="dashboard-grid">
            <div class="stat-box"><div class="stat-label">总订单数</div><div class="stat-value">{{ stats.totalOrders }}</div></div>
            <div class="stat-box"><div class="stat-label">计划总数量</div><div class="stat-value">{{ formatNum(stats.totalQuantity) }}</div></div>
            <div class="stat-box"><div class="stat-label">已完成数量</div><div class="stat-value">{{ formatNum(stats.totalCompleted) }}</div></div>
            <div class="stat-box"><div class="stat-label">总体完成率</div><div class="stat-value">{{ completionRate }}%</div></div>
          </div>
          <el-row :gutter="14">
            <el-col :xs="24" :md="12">
              <el-card>
                <div slot="header">状态分布</div>
                <el-table :data="stats.statusStats" border size="small">
                  <el-table-column prop="status" label="状态" align="center" />
                  <el-table-column prop="count" label="数量" align="center" />
                </el-table>
              </el-card>
            </el-col>
            <el-col :xs="24" :md="12">
              <el-card>
                <div slot="header">系统信息</div>
                <el-descriptions :column="1" border>
                  <el-descriptions-item label="用户数">{{ stats.totalUsers }}</el-descriptions-item>
                  <el-descriptions-item label="角色数">{{ stats.totalRoles }}</el-descriptions-item>
                  <el-descriptions-item label="当前用户">{{ user.nickname || user.username }}</el-descriptions-item>
                </el-descriptions>
              </el-card>
            </el-col>
          </el-row>
        </app-layout>
      `,
      data() {
        return {
          user: authStore.getUser(),
          stats: { totalOrders: 0, totalQuantity: 0, totalCompleted: 0, statusStats: [], totalUsers: 0, totalRoles: 0 }
        };
      },
      computed: {
        completionRate() {
          if (!this.stats.totalQuantity) return 0;
          return (this.stats.totalCompleted / this.stats.totalQuantity * 100).toFixed(1);
        }
      },
      mounted() { this.fetchStats(); },
      methods: {
        formatNum(v) { return Number(v || 0).toLocaleString(); },
        async fetchStats() {
          try {
            const res = await axios.get('/api/dashboard/stats');
            if (res.data.status === 'success') this.stats = res.data.data || this.stats;
          } catch (error) {
            this.$message.error('获取统计数据失败');
          }
        }
      }
    };

    const AssemblyProgress = {
      components: { AppLayout },
      template: `
        <app-layout title="装嵌生产进度" :breadcrumb="['All Process 全流程', '装嵌生产进度查询']">
          <div v-if="loading" class="global-loading-mask">
            <i class="el-icon-loading"></i>
            <span>查询中...</span>
          </div>
          <el-card class="assembly-search-card">
            <el-form :model="searchForm" inline>
              <el-form-item label="区域">
                <el-select v-model="searchForm.区域" placeholder="请选择区域" clearable filterable style="width: 190px">
                  <el-option v-for="item in workshops" :key="item" :label="item" :value="item" />
                </el-select>
              </el-form-item>
              <el-form-item label="订单批号"><el-input v-model="searchForm.订单批号" clearable style="width: 190px" /></el-form-item>
              <el-form-item label="客户"><el-input v-model="searchForm.客户" clearable style="width: 190px" /></el-form-item>
              <el-form-item label="料品编码"><el-input v-model="searchForm.料品编码" clearable style="width: 190px" /></el-form-item>
              <el-form-item label="料品名称"><el-input v-model="searchForm.料品名称" clearable style="width: 190px" /></el-form-item>
              <el-form-item label="开始日期">
                <el-date-picker v-model="searchForm.开始日期" type="date" value-format="yyyy-MM-dd" style="width: 190px" />
              </el-form-item>
              <el-form-item label="结束日期">
                <el-date-picker v-model="searchForm.结束日期" type="date" value-format="yyyy-MM-dd" style="width: 190px" />
              </el-form-item>
              <el-form-item label="完成状态">
                <el-select v-model="searchForm.进度状态" placeholder="请选择状态" clearable style="width: 190px">
                  <el-option label="已完成" value="已完成" />
                  <el-option label="进行中" value="进行中" />
                  <el-option label="未开始" value="未开始" />
                </el-select>
              </el-form-item>
              <el-form-item>
                <el-button type="primary" @click="handleSearch" :loading="loading">查询</el-button>
                <el-button @click="handleReset">重置</el-button>
                <el-button type="success" @click="handleExport" v-if="hasPermission('assembly:export')">导出Excel</el-button>
              </el-form-item>
            </el-form>
          </el-card>
          <el-card class="assembly-table-card">
            <div class="table-head">
              <div class="title">装嵌生产进度查询结果</div>
              <div class="meta">总数据条数：<strong>{{ totalCount }}</strong>，当前页：<strong>{{ currentPage }}</strong>/{{ totalPages }}</div>
            </div>
            <el-table :data="paginatedData" v-loading="loading" border stripe :height="tableHeight" show-summary :summary-method="getSummaries">
              <el-table-column type="index" label="序号" width="60" align="center" :index="indexMethod" />
              <el-table-column prop="客户" label="客户" width="140" align="center" />
              <el-table-column prop="订单批号" label="订单批号" width="170" align="center" />
              <el-table-column prop="分区" label="分区" width="100" align="center" />

              <el-table-column prop="完成数量" label="完成数量" width="100" align="center" />

              <el-table-column prop="最早完成日期" label="最早完成日期" width="120" align="center">

              </el-table-column>
              <el-table-column prop="最晚完成日期" label="最晚完成日期" width="120" align="center">

            <div class="pagination-wrap">

            </div>

      `,
      data() {
        return {
          searchForm: { 区域: '', 订单批号: '', 客户: '', 料品编码: '', 料品名称: '', 开始日期: '', 结束日期: '', 进度状态: '' },
          workshops: [],
          tableData: [],
          totalCount: 0,
          loading: false,
          tableHeight: 420,
          currentPage: 1,
          pageSize: 50
        };
      },
      computed: {
        paginatedData() {
          const start = (this.currentPage - 1) * this.pageSize;
          return this.tableData.slice(start, start + this.pageSize);
        },
        totalPages() {
          return this.tableData.length ? Math.ceil(this.tableData.length / this.pageSize) : 1;
        }
      },
      mounted() {
        this.fetchWorkshops();
        this.handleSearch();
        this.updateTableHeight();
        window.addEventListener('resize', this.updateTableHeight);
      },
      beforeDestroy() {
        window.removeEventListener('resize', this.updateTableHeight);
      },
      methods: {
        hasPermission(code) { return authStore.getPermissions().includes(code); },
        updateTableHeight() {
          this.$nextTick(() => {
            const cardBody = this.$el.querySelector('.assembly-table-card .el-card__body');
            const tableHead = this.$el.querySelector('.assembly-table-card .table-head');
            const pagination = this.$el.querySelector('.assembly-table-card .pagination-wrap');
            if (!cardBody) return;

            const top = cardBody.getBoundingClientRect().top;
            const headHeight = tableHead ? tableHead.offsetHeight : 44;
            const pagerHeight = pagination ? pagination.offsetHeight : 48;
            const bottomGap = 24;
            const available = window.innerHeight - top - headHeight - pagerHeight - bottomGap;
            this.tableHeight = Math.max(260, available);
          });
        },
        async fetchWorkshops() {
          try {
            const res = await axios.get('/api/assembly-production/workshops');
            if (res.data.status === 'success') this.workshops = res.data.data || [];
          } catch (error) {
            this.$message.error('获取车间列表失败');
          }
        },
        async handleSearch() {
          this.loading = true;
          try {
            const params = {};
            Object.keys(this.searchForm).forEach(key => {
              if (this.searchForm[key]) params[key] = this.searchForm[key];
            });
            const res = await axios.get('/api/assembly-production/query', { params });
            if (res.data.status === 'success') {
              this.tableData = res.data.data || [];
              this.totalCount = res.data.total || this.tableData.length;
              this.currentPage = 1;
            }
          } catch (error) {
            this.$message.error('查询失败');
          } finally {
            this.loading = false;
            this.updateTableHeight();
          }
        },
        handleReset() {
          this.searchForm = { 区域: '', 订单批号: '', 客户: '', 料品编码: '', 料品名称: '', 开始日期: '', 结束日期: '', 进度状态: '' };
          this.handleSearch();
        },
        handleExport() {
          if (!this.tableData.length) {
            this.$message.warning('暂无数据可导出');
            return;
          }
          const script = document.createElement('script');
          script.src = '/assets/vendor/xlsx.full.min.js';
          script.onload = () => {
            const worksheet = XLSX.utils.json_to_sheet(this.tableData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, '装嵌生产进度');
            XLSX.writeFile(workbook, `装嵌生产进度_${new Date().toLocaleDateString()}.xlsx`);
            this.$message.success('导出成功');
          };
          script.onerror = () => this.$message.error('导出失败');
          document.body.appendChild(script);
        },
        handleCurrentChange(val) { this.currentPage = val; this.updateTableHeight(); },
        handleSizeChange(val) { this.pageSize = val; this.currentPage = 1; this.updateTableHeight(); },
        indexMethod(index) { return (this.currentPage - 1) * this.pageSize + index + 1; },
        formatDate(value) {
          if (!value) return '';
          const d = new Date(value);
          if (Number.isNaN(d.getTime())) return String(value);
          const y = d.getFullYear();
          const m = String(d.getMonth() + 1).padStart(2, '0');
          const day = String(d.getDate()).padStart(2, '0');
          return `${y}-${m}-${day}`;
        },
        getSummaries({ columns, data }) {
          const sums = [];
          columns.forEach((column, index) => {
            if (index === 0) { sums[index] = '当前页合计'; return; }
            if (['订单数量', '完成数量', '未完成数量'].includes(column.property)) {
              sums[index] = data.reduce((acc, row) => acc + (Number(row[column.property]) || 0), 0).toLocaleString();
            } else {
              sums[index] = '';
            }
          });
          return sums;
        },
        getCompletionRateColor(rate) {
          const value = Number(rate);
          if (!value) return '#606266';
          if (value >= 100) return '#67c23a';
          if (value >= 70) return '#409eff';
          if (value >= 50) return '#e6a23c';
          return '#f56c6c';
        },
        getStatusType(status) {
          const map = { '已完成': 'success', '进行中': 'primary', '未开始': 'info', '已逾期': 'danger', '即将逾期': 'warning' };
          return map[status] || 'info';
        }
      }
    };

    const Checklist = {
      components: { AppLayout },
      template: `
        <app-layout title="外协加工清单" :breadcrumb="['报表', '外协加工清单']">
          <div v-if="loading" class="global-loading-mask">
            <i class="el-icon-loading"></i>
            <span>查询中...</span>

          <el-card>
            <el-form :model="searchForm" inline>
              <el-form-item label="开始时间">
                <el-date-picker

                />
              </el-form-item>
              <el-form-item label="结束时间">
                <el-date-picker
                  v-model="searchForm.结束日期"
                  type="datetime"
                  value-format="yyyy-MM-dd HH:mm:ss"
                  placeholder="选择结束日期时间"
                  style="width: 220px"
                />
              </el-form-item>
              <el-form-item label="订单批号"><el-input v-model="searchForm.订单批号" placeholder="订单批号" /></el-form-item>
              <el-form-item label="外协件名称">
                <el-select
                  v-model="searchForm.外协件名称"
                  multiple
                  filterable
                  clearable
                  collapse-tags
                  placeholder="选择外协件名称"
                  style="width: 420px;"
                  :loading="optionsLoading"
                  @visible-change="handleNameDropdownVisible"
                >
                  <el-option v-for="name in 外协件名称列表" :key="name" :label="name" :value="name" />
                </el-select>
              </el-form-item>
              <el-form-item label="型号规格"><el-input v-model="searchForm.规格型号" placeholder="型号规格" /></el-form-item>
              <el-form-item label="区域"><el-input v-model="searchForm.区域" placeholder="区域" /></el-form-item>
              <el-form-item>
                <el-button type="primary" @click="handleSearch" :loading="loading">查询</el-button>
                <el-button @click="handleReset">重置</el-button>
                <el-button type="success" @click="handleExport" :disabled="!tableData.length">导出Excel</el-button>
                <el-button @click="handlePrint" :disabled="!tableData.length">打印</el-button>
              </el-form-item>
            </el-form>
          </el-card>

          <el-card style="margin-top:12px;">
            <div class="sheet-title-block">
              <div class="sheet-company">万晖五金（深圳）有限公司</div>
              <div class="sheet-title">外协加工清单</div>
            </div>

            <div class="sheet-doc-head">
              <div class="sheet-doc-row">
                <div class="sheet-doc-cell">供方</div>
                <div class="sheet-doc-cell">外协日期</div>
                <div class="sheet-doc-cell">{{ displayDate }}</div>
                <div class="sheet-doc-cell">外协单号：{{ searchForm.订单批号 || '' }}</div>
              </div>
            </div>

            <div class="sheet-table-wrap">
              <el-table
                :data="tableData"
                border
                stripe
                fit
                highlight-current-row
                :header-cell-style="headerCellStyle"
                :cell-style="cellStyle"
                :span-method="objectSpanMethod"
                style="width: 100%; min-width: 2400px;"
                empty-text="暂无数据"
              >
                <el-table-column type="index" label="序号" width="60" align="center" fixed="left" />
                <el-table-column v-for="column in tableColumns" :key="column.prop" :prop="column.prop" :label="column.label" :width="column.width" :min-width="column.minWidth" :align="column.align || 'center'" show-overflow-tooltip>
                  <template slot-scope="scope">
                    <span :class="column.align === 'right' ? 'numeric-cell' : ''">{{ ['交货期限', '订单整货期'].includes(column.prop) ? formatMonthDay(scope.row[column.prop]) : formatCell(scope.row[column.prop], column.prop, scope.row) }}</span>
                  </template>
                </el-table-column>
              </el-table>
            </div>

            <div class="sheet-summary">
              <div>总记录数：<strong>{{ totalCount }}</strong></div>
              <div>当前展示：<strong>{{ tableData.length }}</strong></div>
              <div>盆数总汇：<strong>{{ totalPots }}</strong></div>
              <div>来源：SQL Server / dbo.昨日打磨数据_外协</div>
            </div>

            <div class="sheet-footer-note">
              <div>发货人：</div>
              <div>车间主任：</div>
              <div>物流部：</div>
              <div>采购部：</div>
              <div>经收人：</div>
            </div>
          </el-card>
        </app-layout>
      `,
      data() {
        return {
          searchForm: { 开始日期: '', 结束日期: '', 订单批号: '', 外协件名称: [], 规格型号: '', 区域: '' },
          tableData: [],
          totalCount: 0,
          loading: false,
          optionsLoading: false,
          外协件名称列表: []
        };
      },
      computed: {
        displayDate() {
          const value = this.searchForm.结束日期 || this.searchForm.开始日期;
          if (!value) return '';
          const d = new Date(value);
          if (Number.isNaN(d.getTime())) return value;
          return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
        },
        tableColumns() {
          return [
            { prop: '订单号', label: '订单号', width: 170 },
            { prop: '外协件名称', label: '外协件名称', width: 120 },
            { prop: '规格型号', label: '型号/规格', minWidth: 180, align: 'left' },
            { prop: '订单数量', label: '数（重）量', width: 110, align: 'right' },
            { prop: '单位', label: '单位', width: 80 },
            { prop: '备注', label: '备注', width: 130, align: 'left' },
            { prop: '外协项目', label: '外协项目', width: 120, align: 'left' },
            { prop: '品质要求', label: '品质要求', width: 220, align: 'left' },
            { prop: '交货期限', label: '交货期限', width: 110 },
            { prop: '上线日期', label: '上线日期', width: 110 },
            { prop: '订单整货期', label: '订单落货期', width: 110 },
            { prop: '责任车间', label: '责任车间', width: 110 },
            { prop: '毛重', label: '毛重', width: 90, align: 'right' },
            { prop: '净重', label: '净重', width: 90, align: 'right' },
            { prop: '盆数', label: '盆数', width: 90, align: 'right' },
            
          ];
        },
        totalPots() {
          const seen = new Set();
          let total = 0;
          (this.tableData || []).forEach(row => {
            const key = row && (row.规格型号分组 || `${row.规格型号 || ''}|${row.订单整货期 || ''}`);
            if (seen.has(key)) return;
            seen.add(key);
            total += Number(row.盆数) || 0;
          });
          return total.toFixed(2);
        }
      },
      methods: {
        formatCell(value, prop, row) {
          if (prop === '责任车间' && (value === null || value === undefined || String(value).trim() === '')) {
            const fallback = (row && (row.分区 || row.锁类分区)) || '';
            return String(fallback);
          }
          if (prop === '毛重' && (value === null || value === undefined || String(value).trim() === '')) {
            const fallbackWeight = row && (row.净重 !== null && row.净重 !== undefined && String(row.净重).trim() !== '')
              ? row.净重
              : 0;
            return String(fallbackWeight);
          }
          if (prop === '盆数') {
            const num = Number(value);
            if (!Number.isFinite(num) || num <= 0) return '';
            return Number.isInteger(num) ? String(num) : num.toFixed(2);
          }
          if (value === null || value === undefined) return '';
          return String(value);
        },

        calcPots(row) {
          const remark = String(row && row.备注 ? row.备注 : '').trim();
          if (!remark) return 0;

          if (!/^[0-9+\-*/().\s]+$/.test(remark)) return 0;

          try {
            const value = Function('return (' + remark + ')')();
            const num = Number(value);
            if (!Number.isFinite(num)) return 0;
            return Number.isInteger(num) ? num : Number(num.toFixed(2));
          } catch (error) {
            return 0;
          }
        },

        normalizeChecklistRows(rows) {
          return (rows || []).map(row => Object.assign({}, row, { 盆数: this.calcPots(row) }));
        },

        resolveCellValue(row, column) {
          if (['交货期限', '订单整货期'].includes(column.prop)) {
            return this.formatMonthDay(row[column.prop]);
          }
          return this.formatCell(row[column.prop], column.prop, row);
        },

        async ensureXlsx() {
          if (window.XLSX) return window.XLSX;
          await new Promise((resolve, reject) => {
            const script = document.createElement('script');
            // xlsx-js-style supports cell styles (alignment, font, border).
            script.src = '/assets/vendor/xlsx.bundle.js';
            script.onload = resolve;
            script.onerror = () => {
              const fallback = document.createElement('script');
              fallback.src = '/assets/vendor/xlsx.full.min.js';
              fallback.onload = resolve;
              fallback.onerror = reject;
              document.body.appendChild(fallback);
            };
            document.body.appendChild(script);
          });
          return window.XLSX;
        },

        formatMonthDay(value) {
          if (!value) return '';
          const d = new Date(value);
          if (Number.isNaN(d.getTime())) return String(value);
          return `${d.getMonth() + 1}月${d.getDate()}日`;
        },

        headerCellStyle({ columnIndex }) {
          return {
            background: columnIndex === 0 ? '#fafafa' : '#ffffff',
            color: '#303133',
            fontWeight: '600',
            borderColor: '#dcdfe6',
            textAlign: 'center'
          };
        },

        cellStyle({ column }) {
          return {
            borderColor: '#dcdfe6',
            whiteSpace: 'nowrap'
          };
        },

        async handleSearch() {
          this.loading = true;
          const params = {};
          Object.keys(this.searchForm).forEach(k => {
            const raw = this.searchForm[k];
            if (raw === null || raw === undefined) return;
            
            // Handle 外协件名称 array - convert to comma-separated string
            if (k === '外协件名称' && Array.isArray(raw)) {
              if (raw.length > 0) {
                params[k] = raw.join(',');
              }
              return;
            }
            
            const value = typeof raw === 'string' ? raw.trim() : raw;
            if (value === '') return;
            params[k] = value;
          });

          try {
            const res = await axios.get('/api/checklist/query', { params });
            if (res.data && res.data.status === 'success') {
              this.tableData = this.normalizeChecklistRows(res.data.data || []);
              this.totalCount = res.data.total || this.tableData.length;
            } else {
              this.$message.error((res.data && res.data.message) || '查询失败');
            }
          } catch (err) {
            const msg = err && err.response && err.response.data && err.response.data.message;
            this.$message.error(msg || '查询失败，请查看后端日志');
          } finally {
            this.loading = false;
          }
        },
        handleReset() {
          this.searchForm = { 开始日期: '', 结束日期: '', 订单批号: '', 外协件名称: [], 规格型号: '', 区域: '' };
          this.handleSearch();
        },
        async handleExport() {
          if (!this.tableData.length) {
            this.$message.warning('暂无数据');
            return;
          }
          try {
            const XLSX = await this.ensureXlsx();
            const colCount = this.tableColumns.length;
            const titleRow = new Array(colCount).fill('');
            const subTitleRow = new Array(colCount).fill('');
            const blankRow = new Array(colCount).fill('');
            const infoRow = new Array(colCount).fill('');

            titleRow[0] = '万晖五金（深圳）有限公司';
            subTitleRow[0] = '外协加工清单';
            infoRow[0] = '供方';
            if (colCount >= 4) {
              infoRow[1] = '外协日期';
              infoRow[2] = this.displayDate || '';
              infoRow[3] = `外协单号：${this.searchForm.订单批号 || ''}`;
            }

            const columns = this.tableColumns.map(c => c.label);
            const data = this.tableData.map(r => this.tableColumns.map(c => this.resolveCellValue(r, c)));
            const aoa = [titleRow, subTitleRow, blankRow, infoRow, columns].concat(data);
            const ws = XLSX.utils.aoa_to_sheet(aoa);

            const merges = [
              { s: { r: 0, c: 0 }, e: { r: 0, c: colCount - 1 } },
              { s: { r: 1, c: 0 }, e: { r: 1, c: colCount - 1 } }
            ];
            if (colCount >= 4) {
              merges.push({ s: { r: 3, c: 0 }, e: { r: 3, c: 0 } });
              merges.push({ s: { r: 3, c: 1 }, e: { r: 3, c: 1 } });
              merges.push({ s: { r: 3, c: 2 }, e: { r: 3, c: 2 } });
              merges.push({ s: { r: 3, c: 3 }, e: { r: 3, c: colCount - 1 } });
            }

            // Data area merge: keep the same behavior as table objectSpanMethod.
            const mergeTargetProps = ['备注', '盆数', '毛重', '净重'];
            const headerOffset = 5; // title + subtitle + blank + info + table header
            const getSpecKey = row => (row.规格型号分组 || row.规格型号 || '').toString();

            mergeTargetProps.forEach(prop => {
              const colIndex = this.tableColumns.findIndex(c => c.prop === prop);
              if (colIndex < 0) return;

              let start = 0;
              while (start < this.tableData.length) {
                const currentKey = getSpecKey(this.tableData[start]);
                let end = start;
                while (
                  end + 1 < this.tableData.length &&
                  getSpecKey(this.tableData[end + 1]) === currentKey
                ) {
                  end++;
                }

                if (end > start) {
                  merges.push({
                    s: { r: headerOffset + start, c: colIndex },
                    e: { r: headerOffset + end, c: colIndex }
                  });
                }
                start = end + 1;
              }
            });

            ws['!merges'] = merges;

            ws['!cols'] = this.tableColumns.map(c => ({ wch: Math.max(12, Math.ceil((c.width || c.minWidth || 120) / 10)) }));
            ws['!rows'] = [
              { hpt: 26 },
              { hpt: 22 },
              { hpt: 8 },
              { hpt: 20 },
              { hpt: 20 }
            ];

            const centerStyle = {
              alignment: { horizontal: 'center', vertical: 'center', wrapText: true }
            };
            const headerStyle = {
              alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
              font: { bold: true }
            };

            const setStyle = (r, c, style) => {
              const ref = XLSX.utils.encode_cell({ r, c });
              if (!ws[ref]) ws[ref] = { t: 's', v: '' };
              ws[ref].s = Object.assign({}, ws[ref].s || {}, style);
            };

            // Header row center.
            for (let c = 0; c < colCount; c++) {
              setStyle(4, c, headerStyle);
            }

            // Title and info rows center.
            setStyle(0, 0, { alignment: { horizontal: 'center', vertical: 'center' }, font: { bold: true, sz: 14 } });
            setStyle(1, 0, { alignment: { horizontal: 'center', vertical: 'center' }, font: { bold: true, sz: 12 } });
            setStyle(3, 0, centerStyle);
            setStyle(3, 1, centerStyle);
            setStyle(3, 2, centerStyle);
            setStyle(3, 3, centerStyle);

            // Merged data cells center (top-left cell of each merged range).
            merges.forEach(range => {
              if (range.s.r >= headerOffset) {
                setStyle(range.s.r, range.s.c, centerStyle);
              }
            });

            // Also center non-merged single rows in the same target columns.
            const mergeTargetColIndexes = mergeTargetProps
              .map(prop => this.tableColumns.findIndex(c => c.prop === prop))
              .filter(idx => idx >= 0);
            for (let r = headerOffset; r < headerOffset + this.tableData.length; r++) {
              mergeTargetColIndexes.forEach(c => setStyle(r, c, centerStyle));
            }

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '清单');

            const now = new Date();
            const pad = n => String(n).padStart(2, '0');
            const stamp = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
            XLSX.writeFile(wb, `外协加工清单_${stamp}.xlsx`);
            this.$message.success('导出成功');
          } catch (e) {
            this.$message.error('导出失败，请检查网络后重试');
          }
        },
        objectSpanMethod({ row, column, rowIndex, columnIndex }) {
          const mergeColumns = ['备注', '盆数', '毛重', '净重'];
          
          // columnIndex从0开始，包括序号列，所以实际列是columnIndex-1
          if (columnIndex < 1) return;
          
          const colIndex = columnIndex - 1;
          if (colIndex >= this.tableColumns.length) return;
          
          const colProp = this.tableColumns[colIndex].prop;
          if (!mergeColumns.includes(colProp)) return;
          
          const currentSpec = row.规格型号分组 || row.规格型号;
          
          // 检查前一行是否相同规格
          if (rowIndex > 0) {
            const prevRow = this.tableData[rowIndex - 1];
            const prevSpec = prevRow ? (prevRow.规格型号分组 || prevRow.规格型号) : '';
            if (prevSpec === currentSpec) {
              return [0, 0]; // 隐藏此单元格（由前一行的合并单元格覆盖）
            }
          }
          
          // 计算需要合并多少行
          let spanRow = 1;
          for (let i = rowIndex + 1; i < this.tableData.length; i++) {
            const nextSpec = this.tableData[i].规格型号分组 || this.tableData[i].规格型号;
            if (nextSpec === currentSpec) {
              spanRow++;
            } else {
              break;
            }
          }
          
          return [spanRow, 1];
        },
        handlePrint() {
          const w = window.open('', '_blank');
          const style = `
            <style>
              body{font-family: Arial, "Microsoft YaHei", sans-serif;padding:20px;color:#222;}
              .print-title{text-align:center;margin-bottom:12px;}
              .print-title h2{margin:0;font-size:24px;font-weight:700;}
              .print-title .sub{margin-top:6px;font-size:16px;}
              table{border-collapse:collapse;width:100%;min-width:2100px;}
              th,td{border:1px solid #333;padding:6px;font-size:12px;white-space:nowrap;}
              thead th{background:#f5f7fa;text-align:center;}
              .footer{margin-top:16px;display:flex;justify-content:space-between;font-size:13px;}
            </style>`;
          const cols = this.tableColumns.map(c => `<th>${c.label}</th>`).join('');
          const rows = this.tableData.map(r => '<tr>' + this.tableColumns.map(c => `<td>${this.resolveCellValue(r, c)}</td>`).join('') + '</tr>').join('');
          const tableHtml = `<table border="1" style="border-collapse:collapse;width:100%"><thead><tr>${cols}</tr></thead><tbody>${rows}</tbody></table>`;
          const html = `<div class="print-title"><h2>万晖五金（深圳）有限公司</h2><div class="sub">外协加工清单</div></div>${tableHtml}<div class="footer"><span>发货人：__________</span><span>经收人：__________</span></div>`;
          w.document.write(style + html);
          w.document.close();
          w.print();
        },
        async loadChecklistOptions() {
          this.optionsLoading = true;
          try {
            const params = {};
            ['开始日期', '结束日期', '订单批号', '规格型号', '区域'].forEach(k => {
              const value = this.searchForm[k];
              if (value !== null && value !== undefined && String(value).trim() !== '') {
                params[k] = String(value).trim();
              }
            });
            const res = await axios.get('/api/checklist/options', { params });
            if (res.data && res.data.status === 'success') {
              this.外协件名称列表 = res.data.data || [];
              const validNames = new Set(this.外协件名称列表);
              this.searchForm.外协件名称 = (this.searchForm.外协件名称 || []).filter(name => validNames.has(name));
            } else {
              this.$message.error((res.data && res.data.message) || '加载名称失败');
              this.外协件名称列表 = [];
            }
          } catch (err) {
            this.$message.error('加载外协件名称失败: ' + (err.response?.data?.message || err.message));
            this.外协件名称列表 = [];
          } finally {
            this.optionsLoading = false;
          }
        },
        handleNameDropdownVisible(visible) {
          if (!visible) return;
          this.loadChecklistOptions();
        }
      },
      mounted() {
        this.handleSearch();
      }
    };

    const UserManagement = {
      components: { AppLayout },
      template: `
        <app-layout title="用户管理" :breadcrumb="['系统管理', '用户管理']">
          <el-card>
            <el-form inline>
              <el-form-item><el-button type="primary" v-if="hasPermission('user:add')" @click="handleAdd">新增用户</el-button></el-form-item>
            </el-form>
            <el-table :data="tableData" v-loading="loading" border stripe>
              <el-table-column type="index" label="序号" width="60" align="center" />
              <el-table-column prop="username" label="用户名" align="center" />
              <el-table-column prop="nickname" label="昵称" align="center" />
              <el-table-column prop="email" label="邮箱" align="center" />
              <el-table-column prop="roles" label="角色" align="center" />
              <el-table-column label="可访问页面" min-width="240" align="center">
                <template slot-scope="scope">
                  <el-tag v-for="page in getUserPageAccess(scope.row)" :key="scope.row.id + '-' + page" size="mini" style="margin:2px">{{ page }}</el-tag>
                  <span v-if="!getUserPageAccess(scope.row).length" style="color:#909399">无</span>
                </template>
              </el-table-column>
              <el-table-column prop="status" label="状态" align="center">
                <template slot-scope="scope"><el-tag :type="scope.row.status === 1 ? 'success' : 'danger'" size="small">{{ scope.row.status === 1 ? '启用' : '禁用' }}</el-tag></template>
              </el-table-column>
              <el-table-column prop="createdAt" label="创建时间" align="center" width="170" />
              <el-table-column label="操作" width="180" align="center" v-if="hasPermission('user:edit') || hasPermission('user:delete')">
                <template slot-scope="scope">
                  <el-button size="small" v-if="hasPermission('user:edit')" @click="handleEdit(scope.row)">编辑</el-button>
                  <el-button size="small" type="danger" v-if="hasPermission('user:delete')" @click="handleDelete(scope.row)">删除</el-button>
                </template>
              </el-table-column>
            </el-table>
          </el-card>

          <el-dialog :title="dialogTitle" :visible.sync="dialogVisible" width="520px">
            <el-form :model="form" label-width="84px">
              <el-form-item label="用户名"><el-input v-model="form.username" :disabled="!!form.id" /></el-form-item>
              <el-form-item label="密码" v-if="!form.id"><el-input v-model="form.password" type="password" /></el-form-item>
              <el-form-item label="昵称"><el-input v-model="form.nickname" /></el-form-item>
              <el-form-item label="邮箱"><el-input v-model="form.email" /></el-form-item>
              <el-form-item label="状态"><el-radio-group v-model="form.status"><el-radio :label="1">启用</el-radio><el-radio :label="0">禁用</el-radio></el-radio-group></el-form-item>
              <el-form-item label="角色">
                <el-checkbox-group v-model="form.roles">
                  <el-checkbox v-for="role in allRoles" :key="role.id" :label="role.id">{{ role.name }}</el-checkbox>
                </el-checkbox-group>
              </el-form-item>
              <el-form-item label="可访问页面">
                <el-tag v-for="page in currentUserPageAccess" :key="'user-form-' + page" size="small" style="margin:2px">{{ page }}</el-tag>
                <span v-if="!currentUserPageAccess.length" style="color:#909399">请选择角色后查看</span>
              </el-form-item>
            </el-form>
            <span slot="footer"><el-button @click="dialogVisible=false">取消</el-button><el-button type="primary" @click="handleSave">保存</el-button></span>
          </el-dialog>
        </app-layout>
      `,
      data() {
        return {
          tableData: [],
          allRoles: [],
          loading: false,
          dialogVisible: false,
          dialogTitle: '新增用户',
          form: { id: null, username: '', password: '', nickname: '', email: '', status: 1, roles: [] }
        };
      },
      mounted() {
        this.fetchData();
        this.fetchRoles();
      },
      computed: {
        currentUserPageAccess() {
          const pages = new Set(['首页']);
          const permissionCodes = new Set();
          this.allRoles.forEach(role => {
            if (this.form.roles.includes(role.id)) {
              (role.permissions || []).forEach(code => permissionCodes.add(code));
            }
          });
          this.mapPermissionsToPages(Array.from(permissionCodes)).forEach(page => pages.add(page));
          return Array.from(pages);
        }
      },
      methods: {
        hasPermission(code) { return authStore.getPermissions().includes(code); },
        mapPermissionsToPages(permissionCodes) {
          const pages = new Set();
          const map = {
            'assembly:query': ['装嵌生产进度'],
            'checklist:query': ['外协加工清单'],
            'user:view': ['用户管理'],
            'role:view': ['角色管理']
          };
          (permissionCodes || []).forEach(code => {
            (map[code] || []).forEach(page => pages.add(page));
          });
          return Array.from(pages);
        },
        getUserPageAccess(row) {
          const names = String((row && row.roles) || '').split(',').map(v => v.trim()).filter(Boolean);
          const permissionCodes = new Set();
          this.allRoles.forEach(role => {
            if (names.includes(role.name)) {
              (role.permissions || []).forEach(code => permissionCodes.add(code));
            }
          });
          const pages = new Set(['首页']);
          this.mapPermissionsToPages(Array.from(permissionCodes)).forEach(page => pages.add(page));
          return Array.from(pages);
        },
        async fetchData() {
          this.loading = true;
          try {
            const res = await axios.get('/api/users');
            if (res.data.status === 'success') this.tableData = res.data.data || [];
          } catch (error) {
            this.$message.error('获取用户列表失败');
          } finally {
            this.loading = false;
          }
        },
        async fetchRoles() {
          try {
            const res = await axios.get('/api/roles');
            if (res.data.status === 'success') this.allRoles = res.data.data || [];
          } catch (error) {}
        },
        handleAdd() {
          this.form = { id: null, username: '', password: '', nickname: '', email: '', status: 1, roles: [] };
          this.dialogTitle = '新增用户';
          this.dialogVisible = true;
        },
        handleEdit(row) {
          const roleIds = [];
          if (row.roles) {
            row.roles.split(',').forEach(name => {
              const role = this.allRoles.find(item => item.name === name);
              if (role) roleIds.push(role.id);
            });
          }
          this.form = { id: row.id, username: row.username, password: '', nickname: row.nickname, email: row.email, status: row.status, roles: roleIds };
          this.dialogTitle = '编辑用户';
          this.dialogVisible = true;
        },
        async handleSave() {
          try {
            if (!this.form.id && (!this.form.username || !this.form.password)) {
              this.$message.warning('请输入用户名和密码');
              return;
            }
            const data = { nickname: this.form.nickname, email: this.form.email, status: this.form.status, roles: this.form.roles };
            let res;
            if (this.form.id) {
              res = await axios.put('/api/users/' + this.form.id, data);
            } else {
              res = await axios.post('/api/users', Object.assign(data, { username: this.form.username, password: this.form.password }));
            }
            if (res.data.status !== 'success') {
              this.$message.error(res.data.message || '保存失败');
              return;
            }
            this.$message.success('保存成功');
            this.dialogVisible = false;
            this.fetchData();
          } catch (error) {
            this.$message.error('保存失败');
          }
        },
        async handleDelete(row) {
          try {
            await this.$confirm('确认删除用户 ' + row.username + ' ?', '提示', { type: 'warning' });
            const res = await axios.delete('/api/users/' + row.id);
            if (res.data.status === 'success') {
              this.$message.success('删除成功');
              this.fetchData();
            } else {
              this.$message.error(res.data.message || '删除失败');
            }
          } catch (error) {
            if (error !== 'cancel') this.$message.error('删除失败');
          }
        }
      }
    };

    const RoleManagement = {
      components: { AppLayout },
      template: `
        <app-layout title="角色管理" :breadcrumb="['系统管理', '角色管理']">
          <el-card>
            <el-form inline>
              <el-form-item><el-button type="primary" v-if="hasPermission('role:add')" @click="handleAdd">新增角色</el-button></el-form-item>
            </el-form>
            <el-table :data="tableData" v-loading="loading" border stripe>
              <el-table-column type="index" label="序号" width="60" align="center" />
              <el-table-column prop="name" label="角色名" align="center" />
              <el-table-column prop="description" label="描述" align="center" />
              <el-table-column prop="permissions" label="权限" align="center">
                <template slot-scope="scope">
                  <el-tag v-for="p in scope.row.permissions" :key="p" style="margin: 2px" size="small">{{ p }}</el-tag>
                </template>
              </el-table-column>
              <el-table-column label="可访问页面" min-width="220" align="center">
                <template slot-scope="scope">
                  <el-tag v-for="page in getRolePagesByCodes(scope.row.permissions)" :key="scope.row.id + '-page-' + page" size="mini" style="margin:2px">{{ page }}</el-tag>
                  <span v-if="!getRolePagesByCodes(scope.row.permissions).length" style="color:#909399">无</span>
                </template>
              </el-table-column>
              <el-table-column label="操作" width="180" align="center" v-if="hasPermission('role:edit') || hasPermission('role:delete')">
                <template slot-scope="scope">
                  <el-button size="small" v-if="hasPermission('role:edit')" @click="handleEdit(scope.row)">编辑</el-button>
                  <el-button size="small" type="danger" v-if="hasPermission('role:delete')" @click="handleDelete(scope.row)">删除</el-button>
                </template>
              </el-table-column>
            </el-table>
          </el-card>

          <el-dialog :title="dialogTitle" :visible.sync="dialogVisible" width="620px">
            <el-form :model="form" label-width="80px">
              <el-form-item label="角色名"><el-input v-model="form.name" /></el-form-item>
              <el-form-item label="描述"><el-input v-model="form.description" /></el-form-item>
              <el-form-item label="权限">
                <el-checkbox-group v-model="form.permissions">
                  <el-checkbox v-for="perm in allPermissions" :key="perm.id" :label="perm.id">{{ perm.name }}</el-checkbox>
                </el-checkbox-group>
              </el-form-item>
              <el-form-item label="可访问页面">
                <el-tag v-for="page in currentRolePages" :key="'role-form-' + page" size="small" style="margin:2px">{{ page }}</el-tag>
                <span v-if="!currentRolePages.length" style="color:#909399">请选择权限后查看</span>
              </el-form-item>
            </el-form>
            <span slot="footer"><el-button @click="dialogVisible=false">取消</el-button><el-button type="primary" @click="handleSave">保存</el-button></span>
          </el-dialog>
        </app-layout>
      `,
      data() {
        return {
          tableData: [],
          allPermissions: [],
          loading: false,
          dialogVisible: false,
          dialogTitle: '新增角色',
          form: { id: null, name: '', description: '', permissions: [] }
        };
      },
      mounted() {
        this.fetchData();
        this.fetchPermissions();
      },
      computed: {
        currentRolePages() {
          const selectedCodes = (this.form.permissions || [])
            .map(id => {
              const perm = this.allPermissions.find(item => item.id === id);
              return perm ? perm.code : '';
            })
            .filter(Boolean);
          return this.getRolePagesByCodes(selectedCodes);
        }
      },
      methods: {
        hasPermission(code) { return authStore.getPermissions().includes(code); },
        getRolePagesByCodes(codes) {
          const pages = new Set(['首页']);
          const map = {
            'assembly:query': ['装嵌生产进度'],
            'checklist:query': ['外协加工清单'],
            'user:view': ['用户管理'],
            'role:view': ['角色管理']
          };
          (codes || []).forEach(code => {
            (map[code] || []).forEach(page => pages.add(page));
          });
          return Array.from(pages);
        },
        async fetchData() {
          this.loading = true;
          try {
            const res = await axios.get('/api/roles');
            if (res.data.status === 'success') this.tableData = res.data.data || [];
          } catch (error) {
            this.$message.error('获取角色列表失败');
          } finally {
            this.loading = false;
          }
        },
        async fetchPermissions() {
          try {
            const res = await axios.get('/api/permissions');
            if (res.data.status === 'success') this.allPermissions = res.data.data || [];
          } catch (error) {}
        },
        handleAdd() {
          this.form = { id: null, name: '', description: '', permissions: [] };
          this.dialogTitle = '新增角色';
          this.dialogVisible = true;
        },
        handleEdit(row) {
          const map = {};
          this.allPermissions.forEach(item => { map[item.code] = item.id; });
          this.form = {
            id: row.id,
            name: row.name,
            description: row.description,
            permissions: (row.permissions || []).map(code => map[code]).filter(Boolean)
          };
          this.dialogTitle = '编辑角色';
          this.dialogVisible = true;
        },
        async handleSave() {
          try {
            if (!this.form.name) {
              this.$message.warning('请输入角色名');
              return;
            }
            let res;
            if (this.form.id) {
              res = await axios.put('/api/roles/' + this.form.id, this.form);
            } else {
              res = await axios.post('/api/roles', this.form);
            }
            if (res.data.status !== 'success') {
              this.$message.error(res.data.message || '保存失败');
              return;
            }
            this.$message.success('保存成功');
            this.dialogVisible = false;
            this.fetchData();
          } catch (error) {
            this.$message.error('保存失败');
          }
        },
        async handleDelete(row) {
          try {
            await this.$confirm('确认删除角色 ' + row.name + ' ?', '提示', { type: 'warning' });
            const res = await axios.delete('/api/roles/' + row.id);
            if (res.data.status === 'success') {
              this.$message.success('删除成功');
              this.fetchData();
            } else {
              this.$message.error(res.data.message || '删除失败');
            }
          } catch (error) {
            if (error !== 'cancel') this.$message.error('删除失败');
          }
        }
      }
    };

    const Forbidden = {
      template: `
        <app-layout title="无权限访问" :breadcrumb="['系统', '无权限']">
          <el-result icon="warning" title="无访问权限" subTitle="当前账号没有访问该模块的权限，请联系管理员分配权限。">
            <template slot="extra"><el-button type="primary" @click="$router.push('/dashboard')">返回首页</el-button></template>
          </el-result>
        </app-layout>
      `,
      components: { AppLayout }
    };

    const routes = [
      { path: '/', redirect: '/dashboard' },
      { path: '/login', component: Login },
      { path: '/dashboard', component: Dashboard },
      { path: '/assembly', component: AssemblyProgress, meta: { permission: 'assembly:query' } },
      { path: '/list', component: Checklist, meta: { permission: 'checklist:query' } },
      { path: '/users', component: UserManagement, meta: { permission: 'user:view' } },
      { path: '/roles', component: RoleManagement, meta: { permission: 'role:view' } },
      { path: '/forbidden', component: Forbidden }
    ];

    const router = new VueRouter({ routes });

    async function tryRestoreSession() {
      try {
        const res = await axios.get('/api/check-login');
        if (res.data.loggedIn) {
          authStore.saveAuth({
            user: res.data.user,
            permissions: res.data.permissions,
            menus: res.data.menus
          });
          return true;
        }
      } catch (error) {}
      authStore.clear();
      return false;
    }

    router.beforeEach(async (to, from, next) => {
      if (to.path === '/login') {
        const hasUser = !!authStore.getUser().id;
        next(hasUser ? '/dashboard' : undefined);
        return;
      }

      if (!authStore.getUser().id) {
        const ok = await tryRestoreSession();
        if (!ok) {
          next('/login');
          return;
        }
      }

      const permission = to.meta && to.meta.permission;
      if (permission && !authStore.getPermissions().includes(permission)) {
        next('/forbidden');
        return;
      }

      next();
    });

    new Vue({ router }).$mount('#app');
  </script>
</body>
</html>
